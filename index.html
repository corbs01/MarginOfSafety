<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Berkshire Analyst</title>

  <!-- App styles -->
  <link rel="stylesheet" href="app.css" />

  <!-- React + Babel (browser-side JSX transpilation) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

  <!-- FMP API key banner -->
  <div id="api-key-banner">
    <div class="key-group">
      <label>FMP Key</label>
      <input id="fmp-key-input" class="key-input" type="password" placeholder="financialmodelingprep.com" />
    </div>
    <button id="api-key-save">Save</button>
    <span id="api-key-status"></span>
    <span style="color:#3a2e1a; font-size:11px; margin-left:auto;">Free key at financialmodelingprep.com</span>
  </div>

  <!-- Tool navigation -->
  <nav id="tool-nav">
    <a href="index.html" class="active">🏛 Stock Analyst</a>
    <div class="nav-divider"></div>
    <a href="reverse-dcf.html">📐 Reverse DCF</a>
  </nav>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Load order: keys → fmp → analysis → app (Babel last) -->
  <script src="js/keys.js"></script>
  <script src="js/fmp.js"></script>
  <script src="js/analysis.js"></script>
  <script type="text/babel" src="app.jsx"></script>

</body>
</html>
